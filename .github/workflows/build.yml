name: Build Free3Dicons Site

on:
  repository_dispatch:
    types: [build-site]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for build'
        required: false
        default: 'Manual build'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run build script
        env:
          WP_API_URL:   ${{ secrets.WP_API_URL }}
          WP_API_KEY:   ${{ secrets.WP_API_KEY }}
          CDN_BASE:     ${{ secrets.CDN_BASE }}
          SITE_URL:     ${{ secrets.SITE_URL }}
          DEV_MODE:     'no'
          OUTPUT_DIR:   '.'
          BUILD_REASON: ${{ github.event.client_payload.reason || github.event.inputs.reason || 'Automated build' }}
        run: node build-script/build.js

      - name: Commit generated files
        run: |
          git config --local user.email "build@free3dicons.com"
          git config --local user.name "Free3Dicons Build Bot"
          git add -A
          git diff --staged --quiet || git commit -m "Build: ${{ env.BUILD_REASON }} [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
